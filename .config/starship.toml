# Sets user-defined palette
palette = "catppuccin_macchiato"

[character]
# Note the use of Catppuccin color 'maroon'
success_symbol = "[❯](rosewater)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[username]
show_always=true
style_user = "fg:pink"
style_root = "fg:#3B4252"
format = '[$user ]($style)'

[directory]
style = "fg:lavender"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "fg:sky"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:sky"
format = '[$all_status$ahead_behind ]($style)'

[python]
style = "fg:green"
format = '[(\($virtualenv\) )]($style)'

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
